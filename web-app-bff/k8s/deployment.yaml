apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-bff
  namespace: bookstore-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app-bff
  template:
    metadata:
      labels:
        app: web-app-bff
    spec:
      containers:
        - name: web-app-bff
          image: YOUR_ECR_URI/web-app-bff:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: URL_BASE_BACKEND_SERVICES
              value: http://backend-router
          livenessProbe:
            httpGet:
              path: /status
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
