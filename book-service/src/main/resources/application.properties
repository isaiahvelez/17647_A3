spring.application.name=book-service
server.port=3000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
gemini.api.key=${GEMINI_API_KEY:}
recommendation.service.url-template=${RECOMMENDATION_SERVICE_URL_TEMPLATE:}
recommendation.timeout-millis=${RECOMMENDATION_TIMEOUT_MILLIS:3000}
recommendation.circuit.open-seconds=${RECOMMENDATION_CIRCUIT_OPEN_SECONDS:60}
recommendation.circuit.state-file=${RECOMMENDATION_CIRCUIT_STATE_FILE:/tmp/related-books-circuit-state.txt}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
