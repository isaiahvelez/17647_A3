spring.datasource.url=jdbc:h2:mem:bookdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
gemini.api.key=
recommendation.service.url-template=http://localhost/recommendations?isbn={isbn}
recommendation.timeout-millis=3000
recommendation.circuit.open-seconds=60
recommendation.circuit.state-file=${java.io.tmpdir}/book-service-related-books-test-state.txt
