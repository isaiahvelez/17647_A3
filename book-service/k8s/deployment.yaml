apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  namespace: bookstore-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-service
  template:
    metadata:
      labels:
        app: book-service
    spec:
      containers:
        - name: book-service
          image: YOUR_ECR_URI/book-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://YOUR_RDS_ENDPOINT:3306/booksdb
            - name: SPRING_DATASOURCE_USERNAME
              value: YOUR_DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              value: YOUR_DB_PASSWORD
            - name: GEMINI_API_KEY
              value: YOUR_GEMINI_KEY
            - name: RECOMMENDATION_SERVICE_URL_TEMPLATE
              value: YOUR_RECOMMENDATION_URL_TEMPLATE_WITH_ISBN_PLACEHOLDER
            - name: RECOMMENDATION_TIMEOUT_MILLIS
              value: "8000"
            - name: RECOMMENDATION_CIRCUIT_OPEN_SECONDS
              value: "60"
            - name: RECOMMENDATION_CIRCUIT_STATE_FILE
              value: /circuit-state/related-books-circuit-state.txt
          volumeMounts:
            - name: circuit-state
              mountPath: /circuit-state
          livenessProbe:
            httpGet:
              path: /status
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: circuit-state
          emptyDir: {}
