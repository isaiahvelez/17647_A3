apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-app-bff
  namespace: bookstore-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mobile-app-bff
  template:
    metadata:
      labels:
        app: mobile-app-bff
    spec:
      containers:
        - name: mobile-app-bff
          image: YOUR_ECR_URI/mobile-app-bff:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: BOOK_SERVICE_BASE_URL
              value: http://book-service.bookstore-ns.svc.cluster.local:3000
            - name: CUSTOMER_SERVICE_BASE_URL
              value: http://customer-service.bookstore-ns.svc.cluster.local:3000
          livenessProbe:
            httpGet:
              path: /status
              port: 80
              httpHeaders:
                - name: X-Client-Type
                  value: iOS
                - name: Authorization
                  value: Bearer eyJhbGciOiAibm9uZSIsICJ0eXAiOiAiSldUIn0.eyJzdWIiOiAic3RhcmxvcmQiLCAiaXNzIjogImNtdS5lZHUiLCAiZXhwIjogNDEwMjQ0NDgwMH0.x
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
